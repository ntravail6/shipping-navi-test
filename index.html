          info:'✅匿名 / ヤマト運輸 / 60サイズ・2kg',
          size:true, platform:['Yahoo!フリマ'] },
    ];
}

// ── サイト別計算 ─────────────────────────────────────────────
function calcSite(tSite, tFee, p, dh, dw, dt, wg, ic, pc, pris) {
    let fee, feeFormula;
    if (tSite==='BASE') {
        if (tFee==='2.9') { fee=p*0.029; feeFormula='販売価格 × 2.9%（グロース）'; }
        else               { fee=p*0.066+40; feeFormula='販売価格 × 6.6% + 40円'; }
    } else if (tSite==='ラクマ') {
        fee=p*(Number(tFee)/100); feeFormula=`販売価格 × ${tFee}%`;
    } else if (tSite==='Yahoo!フリマ') {
        fee=p*0.05; feeFormula='販売価格 × 5%';
    } else {
        fee=p*0.10; feeFormula='販売価格 × 10%';
    }
    const all   = getMethods(dh, dw, dt, wg);
    let avail   = all.filter(m => m.size && (!m.platform || m.platform.includes(tSite)));
    if (pris.includes('anon'))  avail = avail.filter(m => m.anon);
    if (pris.includes('trace')) avail = avail.filter(m => m.trace);
    if (pris.includes('conv'))  avail = avail.filter(m => m.conv);
    avail.sort((a,b) => a.cost-b.cost);
    const sel     = avail.length>0 ? avail[0] : all.find(m => (m.name.includes('60')||m.name.includes('宅急便')) && (!m.platform||m.platform.includes(tSite)));
    const feeCeil = Math.ceil(fee);
    const profit  = sel ? Math.floor(p-feeCeil-sel.cost-ic-pc) : null;
    const rate    = (p>0 && profit!==null) ? Math.round((profit/p)*1000)/10 : 0;
    return { sel, avail, profit, rate, feeCeil, feeFormula };
}

function App() {
    const load = (k,d) => { const s=localStorage.getItem(k); if(!s) return d; try{return JSON.parse(s);}catch{return d;} };

    const [site,    setSite]    = useState(()=>load('sn_site','メルカリ'));
    const [feeRate, setFeeRate] = useState(()=>load('sn_fee','10'));
    const [pris,    setPris]    = useState(()=>load('sn_pri',['anon']));
    const [price,   setPrice]   = useState(()=>load('sn_price','2500'));
    const [iCost,   setICost]   = useState(()=>load('sn_ic','500'));
    const [pCost,   setPCost]   = useState(()=>load('sn_pc','50'));
    const [weight,  setWeight]  = useState(()=>load('sn_w','100'));
    const [dims,    setDims]    = useState(()=>load('sn_dims',{h:'25',w:'20',t:'2.5'}));
    const [mode,    setMode]    = useState('detail');
    const [preset,  setPreset]  = useState(null);
    const [hist,    setHist]    = useState(()=>load('sn_hist',[]));
    const [flash,   setFlash]   = useState(false);

    useEffect(()=>{ localStorage.setItem('sn_site',  JSON.stringify(site));    },[site]);
    useEffect(()=>{ localStorage.setItem('sn_fee',   JSON.stringify(feeRate)); },[feeRate]);
    useEffect(()=>{ localStorage.setItem('sn_pri',   JSON.stringify(pris));    },[pris]);
    useEffect(()=>{ localStorage.setItem('sn_price', JSON.stringify(price));   },[price]);
    useEffect(()=>{ localStorage.setItem('sn_ic',    JSON.stringify(iCost));   },[iCost]);
    useEffect(()=>{ localStorage.setItem('sn_pc',    JSON.stringify(pCost));   },[pCost]);
    useEffect(()=>{ localStorage.setItem('sn_w',     JSON.stringify(weight));  },[weight]);
    useEffect(()=>{ localStorage.setItem('sn_dims',  JSON.stringify(dims));    },[dims]);
    useEffect(()=>{ localStorage.setItem('sn_hist',  JSON.stringify(hist));    },[hist]);

    const togglePri = v => setPris(prev => prev.includes(v)?prev.filter(x=>x!==v):[...prev,v]);

    const p  = Number(price)||0;
    const dh = Number(dims.h)||0;
    const dw = Number(dims.w)||0;
    const dt = Number(dims.t)||0;
    const wg = Number(weight)||0;
    const ic = Number(iCost)||0;
    const pc = Number(pCost)||0;

    const res = calcSite(site, feeRate, p, dh, dw, dt, wg, ic, pc, pris);
    const m   = res.sel;

    // 利益UPのヒント
    const hints = [];
    if (dt > 3) hints.push('厚みを3cm以内にできれば、送料が劇的に下がり利益がUPします！');
    if (pris.includes('anon') && m && m.cost > 185) hints.push('「匿名なし」でもよければ、クリックポスト(¥185)等でさらに利益が残ります。');
    if (p > 0 && res.rate < 10 && res.rate >= 0) hints.push('利益率が10%未満です。販売価格の見直しや原価の削減を検討してみましょう。');

    // 全サイト比較（CMP用は通常手数料）
    const CMP_SITES = ['メルカリ','ラクマ','BASE','Yahoo!フリマ'];
    const cmp = CMP_SITES.map(s => ({ site:s, r:calcSite(s, DEF_FEE[s], p, dh, dw, dt, wg, ic, pc, pris) }));
    const bestSite = cmp.reduce((b,c) => (c.r.profit!==null&&(b===null||c.r.profit>b.r.profit))?c:b, null);

    // スライダー
    const SMIN=100, SMAX=25000;
    const sVal = Math.min(Math.max(p||SMIN,SMIN),SMAX);
    const sPct = Math.round(((sVal-SMIN)/(SMAX-SMIN))*100);
    const sliderBg = `linear-gradient(to right, var(--main-pink) ${sPct}%, #eee ${sPct}%)`;

    const rateColor = r => r>=20?'#2e7d32':r>=0?'#e65100':'#c62828';
    const rateBg    = r => r>=20?'#e8f5e9':r>=0?'#fff3e0':'#fce4e4';

    const applyPreset = i => {
        const pr = PRESETS[i];
        setPreset(i); setDims({h:pr.h,w:pr.w,t:pr.t}); setWeight(pr.wg);
        setFlash(true); setTimeout(()=>setFlash(false),600);
    };

    const saveHist = () => {
        if (!m) return;
        const now = new Date();
        setHist(prev => [{
            id: now.getTime(),
            date: `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
            site, feeRate, price, iCost, pCost, weight, dims,
            profit:res.profit, rate:res.rate, methodName:m.name,
        }, ...prev].slice(0,10));
        alert('履歴に保存しました！');
    };

    const onCopy = () => {
        if (!m) return;
        const mat = m.material>0?`\n  └ 配送資材(${m.materialNote}): ¥${m.material}`:'';
        const txt = [
            '【送料ナビ Pro 計算結果】',
            `サイト: ${site}`,
            `販売価格: ¥${price}`,
            `手数料: -¥${res.feeCeil}（${res.feeFormula}）`,
            `送料(${m.name}): -¥${m.shipping}${mat}`,
            ic>0?`原価: -¥${iCost}`:null,
            pc>0?`資材費: -¥${pCost}`:null,
            `純利益: ¥${res.profit}（利益率 ${res.rate}%）`,
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(txt);
        alert('クリップボードにコピーしました！');
    };

    const resetInputs = () => {
        if (!window.confirm('入力内容をすべてリセットしますか？')) return;
        setSite('メルカリ'); setFeeRate('10'); setPris(['anon']);
        setPrice(''); setICost(''); setPCost('');
        setWeight(''); setDims({h:'',w:'',t:''}); setPreset(null);
    };

    const restoreHist = e => {
        setSite(e.site); setFeeRate(e.feeRate);
        setPrice(e.price); setICost(e.iCost); setPCost(e.pCost);
        setWeight(e.weight); setDims(e.dims);
    };

    const shortName = n => n.replace(/[（(][^)）]*[)）]/g,'').replace('パック','').replace('かんたん発送','').trim();

    return (
        <div>
            <h1>📦 送料計算シミュレーター</h1>

            {/* localStorage 注意書き */}
            <div className="storage-note">
                💾 <strong>入力内容は自動保存されます</strong>（このブラウザ・端末のみ）<br/>
                別のブラウザや端末では引き継がれません。計算履歴は「履歴に保存」ボタンで保存できます。
            </div>

            {/* ── 入力カード ── */}
            <div className="card">
                <div className="card-header">
                    <span className="label" style={{margin:0}}>📝 商品情報を入力</span>
                    <button className="reset-btn" onClick={resetInputs}>🗑 リセット</button>
                </div>

                {/* サイト・手数料 */}
                {(site==='メルカリ'||site==='メルカリショップス'||site==='Yahoo!フリマ') ? (
                    <div>
                        <label className="label">販売サイト</label>
                        <select value={site} onChange={e=>{ setSite(e.target.value); setFeeRate(DEF_FEE[e.target.value]); }}>
                            {SITES.map(s=><option key={s}>{s}</option>)}
                        </select>
                    </div>
                ) : (
                    <div className="grid-2">
                        <div>
                            <label className="label">販売サイト</label>
                            <select value={site} onChange={e=>{ setSite(e.target.value); setFeeRate(DEF_FEE[e.target.value]); }}>
                                {SITES.map(s=><option key={s}>{s}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="label">手数料率</label>
                            {site==='BASE' ? (
                                <select value={feeRate} onChange={e=>setFeeRate(e.target.value)}>
                                    <option value="6.6">通常(6.6%+40円)</option>
                                    <option value="2.9">グロース(2.9%)</option>
                                </select>
                            ) : (
                                <select value={feeRate} onChange={e=>setFeeRate(e.target.value)}>
                                    <option value="10">10%（通常）</option>
                                    <option value="6">6%（中級）</option>
                                    <option value="4.5">4.5%（上級）</option>
                                </select>
                            )}
                        </div>
                    </div>
                )}

                <label className="label">こだわり（複数選択可）</label>
                <div className="priority-grid">
                    {[['anon','📦 匿名発送'],['trace','🔍 追跡あり'],['conv','🏪 コンビニ/ポスト']].map(([v,lbl])=>(
                        <React.Fragment key={v}>
                            <input type="checkbox" id={v} className="pri-check" checked={pris.includes(v)} onChange={()=>togglePri(v)} />
                            <label htmlFor={v} className="pri-label">{lbl}</label>
                        </React.Fragment>
                    ))}
                </div>

                <label className="label">販売価格（円）</label>
                <input type="number" inputMode="numeric" value={price}
                    onChange={e=>setPrice(e.target.value)} onFocus={e=>e.target.select()} />
                <input type="range" className="price-slider" min={SMIN} max={SMAX} step="100"
                    value={sVal} style={{background:sliderBg}}
                    onChange={e=>setPrice(e.target.value)} />
                <div className="slider-ends"><span>¥100</span><span>¥12,500</span><span>¥25,000</span></div>

                <div className="grid-2">
                    <div>
                        <label className="label">原価（円）</label>
                        <input type="number" inputMode="numeric" value={iCost}
                            onChange={e=>setICost(e.target.value)} onFocus={e=>e.target.select()} />
                    </div>
                    <div>
                        <label className="label">資材費（円）</label>
                        <input type="number" inputMode="numeric" value={pCost}
                            onChange={e=>setPCost(e.target.value)} onFocus={e=>e.target.select()} />
                    </div>
                </div>

                {/* 入力モードタブ */}
                <div className="mode-tabs">
                    <button className={`mode-tab ${mode==='detail'?'active':''}`} onClick={()=>setMode('detail')}>📐 詳細入力</button>
                    <button className={`mode-tab ${mode==='quick'?'active':''}`}  onClick={()=>setMode('quick')}>🏷️ かんたん検索</button>
                </div>

                {mode==='detail' ? (
                    <div className={flash?'flash':''}>
                        <label className="label">サイズ（縦 / 横 / 厚さ cm）</label>
                        <div className="size-inputs">
                            <input type="number" inputMode="decimal" placeholder="縦"   value={dims.h} onChange={e=>setDims({...dims,h:e.target.value})} />
                            <input type="number" inputMode="decimal" placeholder="横"   value={dims.w} onChange={e=>setDims({...dims,w:e.target.value})} />
                            <input type="number" inputMode="decimal" placeholder="厚さ" value={dims.t} onChange={e=>setDims({...dims,t:e.target.value})} />
                        </div>
                        <label className="label">重さ（g）</label>
                        <input type="number" inputMode="numeric" placeholder="重さ(g)" value={weight}
                            onChange={e=>setWeight(e.target.value)} onFocus={e=>e.target.select()} />
                    </div>
                ) : (
                    <div>
                        <div className="preset-grid">
                            {PRESETS.map((pr,i)=>(
                                <button key={i} className={`preset-btn ${preset===i?'active':''}`} onClick={()=>applyPreset(i)}>
                                    {pr.label}
                                </button>
                            ))}
                        </div>
                        {preset!==null ? (
                            <div className="preset-summary">
                                縦 {PRESETS[preset].h} × 横 {PRESETS[preset].w} × 厚さ {PRESETS[preset].t} cm　／　{PRESETS[preset].wg} g
                            </div>
                        ) : (
                            <div className="preset-summary">カテゴリを選ぶとサイズが自動入力されます</div>
                        )}
                    </div>
                )}
            </div>

            {/* ── 結果カード ── */}
            <div className="card">
                <div className="result-box">
                    <div style={{fontSize:'0.8rem'}}>最終純利益</div>
                    <div className="profit-val" style={{color:(res.profit||0)<0?'#e57373':'var(--main-pink)'}}>
                        {(res.profit||0)<0?'-':''}¥{Math.abs(res.profit||0).toLocaleString()}
                    </div>
                    <span className="rate-badge" style={{background:rateBg(res.rate),color:rateColor(res.rate)}}>
                        利益率 {res.rate}%
                    </span>
                    {m && <div className="method-badge" style={{marginLeft:'4px'}}>{m.name}</div>}
                    {(res.profit||0)<0 && <div className="approx-note">⚠️ 赤字です。価格・原価を見直してください</div>}
                </div>

                {m && (
                    <div className="spec-card">
                        <strong>📦 配送ガイド</strong><br/>
                        {m.info}
                        {m.material>0 && (
                            <span> ／ 配送資材({m.materialNote})¥{m.material}が別途必要</span>
                        )}
                    </div>
                )}

                {/* 利益UPのヒント */}
                {hints.length>0 && (
                    <div className="if-card">
                        <strong>💡 利益UPのヒント</strong>
                        {hints.map((text,i)=><div key={i} className="if-item">{text}</div>)}
                    </div>
                )}

                {/* 利益内訳 */}
                <div className="detail-table">
                    <div className="detail-row">
                        <span>販売価格</span><span>¥{p.toLocaleString()}</span>
                    </div>
                    <div className="detail-row" style={{color:'#e57373'}}>
                        <span>販売手数料 <span className="formula">{res.feeFormula}</span></span>
                        <span>- ¥{res.feeCeil.toLocaleString()}</span>
                    </div>
                    {m && <>
                        <div className="detail-row" style={{color:'#e57373'}}>
                            <span>送料</span><span>- ¥{m.shipping.toLocaleString()}</span>
                        </div>
                        {m.material>0 && (
                            <div className="detail-sub" style={{color:'#bbb'}}>
                                <span>└ 配送資材（{m.materialNote}）</span><span>- ¥{m.material}</span>
                            </div>
                        )}
                    </>}
                    <div className="detail-row" style={{color:'#888'}}>
                        <span>コスト計（原価・資材費）</span>
                        <span>- ¥{(ic+pc).toLocaleString()}</span>
                    </div>
                </div>

                <div className="btn-row">
                    <button className="btn-copy" onClick={onCopy}>📋 結果をコピー</button>
                    <button className="btn-save" onClick={saveHist}>🕐 履歴に保存</button>
                </div>
            </div>

            {/* ── 全サイト比較カード ── */}
            <div className="card">
                <div className="label" style={{marginBottom:'4px'}}>🏆 全サイト比較</div>
                <div className="cmp-hint">タップで選択サイトを切り替え。ラクマ・BASEは通常手数料で比較。</div>
                <div className="cmp-grid">
                    {cmp.map(({site:s,r})=>{
                        const isBest    = bestSite && bestSite.site===s;
                        const isCurrent = s===site || (s==='メルカリ' && site==='メルカリショップス');
                        const pVal      = r.profit;
                        return (
                            <div key={s}
                                className={`cmp-cell ${isBest?'is-best':''} ${isCurrent?'is-current':''}`}
                                onClick={()=>{ setSite(s); setFeeRate(DEF_FEE[s]); }}>
                                <div className="cmp-site">{s}</div>
                                <div className="cmp-profit" style={{color:pVal===null?'#ccc':pVal<0?'#e57373':isBest?'var(--main-pink)':'#777'}}>
                                    {pVal===null?'—':(pVal<0?'-':'')+'¥'+Math.abs(pVal).toLocaleString()}
                                </div>
                                <div className="cmp-rate" style={{color:rateColor(r.rate)}}>
                                    {pVal!==null?r.rate+'%':'—'}
                                </div>
                                <div className="cmp-method">{r.sel?shortName(r.sel.name):'—'}</div>
                                {isBest    && <div className="cmp-badge">最高利益</div>}
                                {isCurrent && !isBest && <div className="cmp-badge" style={{background:'#90a4ae'}}>選択中</div>}
                            </div>
                        );
                    })}
                </div>
            </div>

            {/* ── 計算履歴カード ── */}
            {hist.length>0 && (
                <div className="card">
                    <div className="hist-header">
                        <span className="label" style={{margin:0}}>🕐 計算履歴（直近{hist.length}件）</span>
                        <button className="clear-btn" onClick={()=>{ if(window.confirm('履歴を削除しますか？')) setHist([]); }}>🗑 履歴を削除</button>
                    </div>
                    <div className="hist-hint">タップすると入力値を復元できます</div>
                    {hist.map(e=>(
                        <div key={e.id} className="hist-item" onClick={()=>restoreHist(e)}>
                            <div className="hist-meta">{e.date} · {e.site}</div>
                            <div className="hist-main">
                                ¥{Number(e.price).toLocaleString()} →{' '}
                                <strong style={{color:e.profit<0?'#e57373':'var(--main-pink)'}}>
                                    ¥{Number(e.profit).toLocaleString()}
                                </strong>
                                <span className="hist-rate">({e.rate}%)</span>
                            </div>
                            <div className="hist-method">{e.methodName}</div>
                        </div>
                    ))}
                </div>
            )}

            <div className="note">※ 料金は2026年3月〜4月時点。最新情報は各サービス公式サイトでご確認ください。</div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
